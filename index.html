<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマートオーダー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #ffffff;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            user-select: none;
            min-height: 100dvh;
            height: 100dvh;

            padding-top: max(60px, env(safe-area-inset-top));
        }
        .header-green {
            background-color: #2d8c3c;
            color: white;
            font-size: 20px;
            padding: 30px;
            text-align: center;
            height:75px;
        }
        .btn-red {
            background: linear-gradient(to bottom, #d32f2f, #b71c1c);
            color: white;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: bold;
            box-shadow: 0 4px #801010;
            border: 1px solid #a01010;
        }
        .btn-red:active {
            box-shadow: 0 1px #801010;
            transform: translateY(3px);
        }
        .btn-green {
            background: linear-gradient(to bottom, #66bb6a, #43a047);
            color: white;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: bold;
            box-shadow: 0 4px #2e7d32;
            border: 1px solid #2e7d32;
        }
        .btn-green:active {
            box-shadow: 0 1px #2e7d32;
            transform: translateY(3px);
        }
        .numpad-btn {
            background: linear-gradient(to bottom, #ffffff, #f0f0f0);
            border: 1px solid #ccc;
            border-radius: 8px;
            height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2d8c3c;
            box-shadow: 0 2px #ddd;
        }
        .numpad-btn:active {
            background: #e0e0e0;
            box-shadow: none;
            transform: translateY(2px);
        }
        .nav-btn {
            border: 1px solid #2d8c3c;
            color: #2d8c3c;
            font-size: 15px;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4px 0;
            background: white;
            position: relative;
        }
        .nav-btn.active {
            background-color: #e8f5e9;
        }
        .qty-btn {
            border: 1px solid #ccc;
            border-radius: 4px;
            width: 2.5rem;
            height: 2.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #2d8c3c;
        }
        .cart-badge {
            position: absolute;
            top: 2px;
            right: 10px;
            background-color: #ff0000;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .hidden { display: none; }

        .page {
            padding-bottom: calc(80px + env(safe-area-inset-bottom));
        }
        
        .footer {
            background-color: #ff0000;
        }

        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    
    <!-- 1. 番号入力画面 -->
    <div id="view-numpad" class="flex-1 flex flex-col page">
        <div class="header-green">番号を入力してください -test-</div>
        <div class="flex justify-between items-center px-4 mt-8">
            <div id="item-name-display" class="text-3xl font-bold text-[#2d8c3c] flex-1"></div>
            <button onclick="goToQty()" class="btn-red ml-2">次へ進む</button>
        </div>
        <div class="border-2 border-[#2d8c3c] rounded m-4 h-12 flex items-center justify-center text-3xl font-bold" id="input-display"></div>
        <div class="flex-1 p-4 grid grid-cols-3 gap-2">
            <button class="numpad-btn" onclick="addNum(1)">1</button>
            <button class="numpad-btn" onclick="addNum(2)">2</button>
            <button class="numpad-btn" onclick="addNum(3)">3</button>
            <button class="numpad-btn" onclick="addNum(4)">4</button>
            <button class="numpad-btn" onclick="addNum(5)">5</button>
            <button class="numpad-btn" onclick="addNum(6)">6</button>
            <button class="numpad-btn" onclick="addNum(7)">7</button>
            <button class="numpad-btn" onclick="addNum(8)">8</button>
            <button class="numpad-btn" onclick="addNum(9)">9</button>
            <div></div>
            <button class="numpad-btn" onclick="addNum(0)">0</button>
            <button class="numpad-btn bg-green-500 text-white" style="background: linear-gradient(to bottom, #66bb6a, #43a047);" onclick="delNum()">削除</button>
        </div>
    </div>

    <!-- 2. 数量選択画面 -->
    <div id="view-qty" class="flex-1 flex flex-col page hidden">
        <div class="header-green">数量を選択してください</div>
        <div class="p-8 mt-10">
            <div class="flex justify-between items-end border-b border-gray-200 pb-2">
                <div id="selected-item-name" class="text-3xl font-bold text-gray-800"></div>
                <div id="selected-item-price" class="text-2xl font-bold text-gray-800"></div>
            </div>
            <div class="flex justify-end items-center space-x-4 mt-8">
                <button class="qty-btn" onclick="changeQty(-1)">−</button>
                <div id="qty-display" class="border border-gray-300 rounded px-4 py-1 text-xl font-bold">1</div>
                <button class="qty-btn" onclick="changeQty(1)">＋</button>
            </div>
            <div class="flex justify-center space-x-4 mt-12">
                <button onclick="showPage('view-numpad')" class="btn-green px-8">もどる</button>
                <button onclick="addToCart()" class="btn-red px-6">注文かごへ追加する</button>
            </div>
        </div>
    </div>

    <!-- 3. 注文かご画面 -->
    <div id="view-cart" class="flex-1 flex flex-col page hidden">
        <div class="header-green">～追加注文～</div>
        <div class="flex-1 overflow-y-auto p-4">
            <div id="cart-items-list" class="space-y-4"></div>
        </div>
        <div class="p-4 border-t border-gray-200">
            <div class="flex justify-between text-xl font-bold mb-4">
                <span id="total-count">0点</span>
                <span id="total-price">合計 0円 (税込)</span>
            </div>
            <div class="flex justify-center space-x-4">
                <button onclick="showPage('view-numpad')" class="btn-green px-12">追加</button>
                <button onclick="submitOrder()" class="btn-red px-12">注文</button>
            </div>
        </div>
    </div>

    <!-- 4. 注文履歴画面 -->
    <div id="view-history" class="flex-1 flex flex-col page hidden">
        <div class="header-green">注文履歴</div>

        <div class="flex-1 overflow-y-auto p-4">

            <div class="p-1 overflow-y-auto">
                <div id="orderContainer"></div>
            </div>

            <div id="history-empty" class="text-center text-gray-400 mt-20">
                まだ注文履歴はありません
            </div>

        </div>
    </div>

    <!-- 下部ナビゲーション -->
    <div class="grid grid-cols-5 h-16 border-t border-gray-300 bg-white footer-nav">
        <button onclick="showPage('view-numpad')" class="nav-btn" id="nav-add"><span>注文</span><span>追加</span></button>
        <button onclick="showPage('view-cart')" class="nav-btn" id="nav-cart">
            <div id="cart-badge" class="cart-badge hidden">0</div>
            <span>注文</span><span>かご</span>
        </button>
        <button onclick="showPage('view-history')" class="nav-btn" id="nav-history"><span>注文</span><span>履歴</span></button>
        <button class="nav-btn"><span>店員</span><span>呼出</span></button>
        <button class="nav-btn"><span>会計</span><span>する</span></button>
    </div>

    <footer class="text-center text-gray-500 text-sm p-2" style="position: relative; top:-65px; background-color:#2d8c3c; color:white;">
        &copy; 2026 スマートオーダーシステム
    </footer>

    <script type="module">
        import { initializeApp }
        from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

        import {
            getFirestore,
            collection,
            addDoc,
            serverTimestamp,
            query,
            where,
            getDocs,
            orderBy
        }
        from "https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA11hBtKkMkgzmng6Gn4KO98ZKlwJeEqxI",
            authDomain: "lossavoid-d3205.firebaseapp.com",
            projectId: "lossavoid-d3205",
            storageBucket: "lossavoid-d3205.firebasestorage.app",
            messagingSenderId: "775487807173",
            appId: "1:775487807173:web:b0b53a07284ef3917d5aac"
        };

        const app = initializeApp(firebaseConfig);

        window.db = getFirestore(app);
        window.fbCollection = collection;
        window.fbAddDoc = addDoc;
        window.fbServerTimestamp = serverTimestamp;
        window.fbQuery = query;
        window.fbWhere = where;
        window.fbGetDocs = getDocs;
        window.fbOrderBy = orderBy;
    </script>

    <script>
        const tableNumber =
            location.hash.replace("#", "") || "0";
        let currentInput = "";
        let currentQty = 1;
        let cart = [];
        let history = [];
        const menuData = {

            "1408": { name: "蒸し鶏の香味ソース", price: 280},

            "1452": { name: "アロスティチーニ（Ｗサイズ）", price: 800},

            "5101": { name: "セットドリンクバー", price: 200},
            "3212": { name: "プリンとティラミスクラシコの盛合せ", price: 500},
            "3206": { name: "イタリアンプリン", price: 250},
            "3201": { name: "ティラミスクラシコ", price: 250},
            "3207": { name: "チョコレートケーキ", price: 300},
            "3205": { name: "ミルクジェラート", price: 250},
            "3216": { name: "チョコレートケーキ＆ミルクジェラート", price: 500},
            "3213": { name: "トリフアイスクリーム", price: 350},
            "3215": { name: "コーヒーゼリー＆ミルクジェラート", price: 350},
            "3214": { name: "ジェラート＆シナモンフォッカチオ", price: 450},
        };

        // --- 画面制御 ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (pageId === 'view-numpad') document.getElementById('nav-add').classList.add('active');
            if (pageId === 'view-cart') {
                document.getElementById('nav-cart').classList.add('active');
                renderCart();
            }
            if (pageId === 'view-history') {
                document.getElementById('nav-history').classList.add('active');
                renderHistory();
            }
        }

        async function renderHistory() {

            const container =
                document.getElementById("orderContainer");

            const emptyMsg =
                document.getElementById("history-empty");

            container.innerHTML = "";

            const q = window.fbQuery(
                window.fbCollection(window.db, "orders"),
                window.fbWhere("table", "==", tableNumber)
            );

            const snapshot = await window.fbGetDocs(q);

            console.log("卓番", tableNumber);
            console.log("件数", snapshot.size);

            if (snapshot.empty) {

                emptyMsg.classList.remove("hidden");
                return;
            }

            emptyMsg.classList.add("hidden");

            snapshot.forEach(doc => {

                const order = doc.data();

                const time =
                    order.createdAt?.toDate()
                    ?.toLocaleTimeString("ja-JP", {
                        hour: "2-digit",
                        minute: "2-digit"
                    }) || "--:--";

                order.items.forEach(item => {

                container.innerHTML += `
                <div class="border rounded p-3 mb-2 bg-white">

                    <div class="flex justify-between items-center">

                        <div class="font-bold text-lg">
                            ${item.name}
                        </div>

                        <div class="font-bold">
                            ${item.qty}個
                        </div>

                    </div>

                    <div class="text-gray-500 text-sm mt-1">
                        ${time}
                    </div>

                </div>
                `;

                });

            });

        }

        // --- 番号入力 ---
        function addNum(n) {
            if (currentInput.length < 4) {
                currentInput += n;
                updateNumpadDisplay();
            }
        }
        function delNum() {
            currentInput = currentInput.slice(0, -1);
            updateNumpadDisplay();
        }
        function updateNumpadDisplay() {
            document.getElementById('input-display').innerText = currentInput;
            const item = menuData[currentInput];
            document.getElementById('item-name-display').innerText = item ? item.name : "";
        }

        function goToQty() {
            const item = menuData[currentInput];
            if (!item) {
                alert("有効な番号を入力してください");
                return;
            }
            document.getElementById('selected-item-name').innerText = item.name;
            document.getElementById('selected-item-price').innerText = item.price + "円";
            currentQty = 1;
            updateQtyDisplay();
            showPage('view-qty');
        }

        // --- 数量選択 ---
        function changeQty(diff) {
            currentQty = Math.max(1, currentQty + diff);
            updateQtyDisplay();
        }
        function updateQtyDisplay() {
            document.getElementById('qty-display').innerText = currentQty;
        }

        // --- カート機能 ---
        function addToCart() {
            const item = menuData[currentInput];
            const existing = cart.find(c => c.code === currentInput);
            if (existing) {
                existing.qty += currentQty;
            } else {
                cart.push({ code: currentInput, name: item.name, price: item.price, qty: currentQty });
            }
            currentInput = "";
            updateNumpadDisplay();
            updateCartBadge();
            showPage('view-cart');
        }

        function updateCartBadge() {
            const badge = document.getElementById('cart-badge');
            if (cart.length > 0) {
                badge.innerText = cart.length;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        function renderCart() {
            const list =
                document.getElementById("cart-items-list");
            list.innerHTML = "";
            let totalP = 0;
            let totalC = 0;

            cart.forEach((item, index) => {
                totalP += item.price * item.qty;
                totalC += item.qty;
                const div = document.createElement('div');
                div.className = "border border-gray-300 rounded p-4 bg-gray-50";
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <div class="text-xl font-bold">${item.name}</div>
                        <div class="text-lg">${item.price * item.qty}円</div>
                    </div>
                    <div class="flex justify-end items-center space-x-4">
                        <button class="qty-btn bg-white" onclick="updateCartQty(${index}, -1)">−</button>
                        <div class="border border-gray-300 rounded px-4 py-1 bg-white font-bold">${item.qty}</div>
                        <button class="qty-btn bg-white" onclick="updateCartQty(${index}, 1)">＋</button>
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('total-count').innerText = totalC + "点";
            document.getElementById('total-price').innerText = `合計 ${totalP}円 (税込)`;
        }

        function updateCartQty(index, diff) {
            cart[index].qty += diff;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartBadge();
            renderCart();
        }

        // --- 履歴機能 ---


        // --- 最終注文送信 ---
        async function submitOrder() {

            if (cart.length === 0) {
                alert("カートが空です");
                return;
            }

            if (!confirm("注文を確定しますか？")) {
                return;
            }

            try {

                console.log("保存開始");

                const tableNumber =
                    location.hash.replace("#", "") || "10";

                console.log("卓番", tableNumber);

                await window.fbAddDoc(
                    window.fbCollection(window.db, "orders"),
                    {
                        table: tableNumber,
                        status: "waiting",
                        createdAt: window.fbServerTimestamp(),
                        items: cart
                    }
                );

                console.log("保存成功");

                alert("注文が送信されました！");

                cart = [];

                updateCartBadge();

                showPage('view-history');

            }
            catch(error){

                console.error(error);

                alert(error.message);
            }
        }

        showPage('view-numpad');
    </script>
</body>
</html>
